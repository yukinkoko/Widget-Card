<svg viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Hiragino Sans','Helvetica Neue',sans-serif">
<title>単語登録画面 モノクロ案</title>
<desc>フォルダに単語を手動登録。単語・読み方・意味・例文（任意）を入力。下にウィジェットでの見え方プレビュー（新規は段階バー0）。まず3語の軽さ。完全モノクロ。</desc>
<rect x="0" y="0" width="680" height="780" rx="16" fill="#EEEEEC" stroke="#E4E4E2"/>
<rect x="170" y="24" width="340" height="732" rx="46" fill="#F2F2F1" stroke="#DEDEDC" stroke-width="1.5"/>
<text x="210" y="60" font-size="13" fill="#1C1C1E">9:41</text>
<text x="430" y="60" font-size="11" fill="#8A8C90">5G</text>
<rect x="458" y="50" width="20" height="11" rx="2" fill="none" stroke="#1C1C1E" stroke-width="1.2"/>
<rect x="460" y="52" width="13" height="7" rx="1" fill="#1C1C1E"/>
<rect x="478" y="53" width="2" height="5" rx="1" fill="#1C1C1E"/>
<text x="198" y="105" font-size="20" fill="#1C1C1E">‹</text>
<text x="224" y="104" font-size="17" fill="#1C1C1E">単語を追加</text>
<text x="466" y="104" text-anchor="end" font-size="12" fill="#8A8C90">1 / 3</text>
<text x="198" y="126" font-size="12" fill="#8A8C90">韓国旅行で使う単語</text>
<text x="198" y="162" font-size="12" fill="#8A8C90">単語</text>
<rect x="190" y="172" width="300" height="44" rx="10" fill="#F6F6F5" stroke="#DADAD8"/>
<text x="208" y="200" font-size="16" fill="#1C1C1E">감사합니다</text>
<text x="198" y="238" font-size="12" fill="#8A8C90">読み方</text>
<rect x="190" y="248" width="300" height="44" rx="10" fill="#F6F6F5" stroke="#DADAD8"/>
<text x="208" y="276" font-size="15" fill="#1C1C1E">カムサハムニダ</text>
<text x="198" y="314" font-size="12" fill="#8A8C90">意味</text>
<rect x="190" y="324" width="300" height="44" rx="10" fill="#F6F6F5" stroke="#DADAD8"/>
<text x="208" y="352" font-size="15" fill="#1C1C1E">ありがとうございます</text>
<text x="198" y="390" font-size="12" fill="#8A8C90">例文（任意）</text>
<rect x="190" y="400" width="300" height="44" rx="10" fill="#F6F6F5" stroke="#DADAD8"/>
<text x="208" y="428" font-size="14" fill="#5E6066">정말 감사합니다.</text>
<text x="198" y="476" font-size="12" fill="#8A8C90">プレビュー（ウィジェットでの見え方）</text>
<rect x="190" y="488" width="300" height="80" rx="14" fill="#FFFFFF" stroke="#E9E9E7"/>
<text x="212" y="522" font-size="20" fill="#1C1C1E">감사합니다</text>
<text x="212" y="544" font-size="11" fill="#5E6066">カムサハムニダ</text>
<text x="212" y="560" font-size="12" fill="#8A8C90">ありがとうございます</text>
<rect x="446" y="524" width="4" height="6" rx="2" fill="#D6D6D4"/>
<rect x="452.5" y="520" width="4" height="10" rx="2" fill="#D6D6D4"/>
<rect x="459" y="516" width="4" height="14" rx="2" fill="#D6D6D4"/>
<rect x="190" y="600" width="145" height="48" rx="12" fill="#FFFFFF" stroke="#DADAD8"/>
<text x="262" y="630" text-anchor="middle" font-size="13" fill="#1C1C1E">＋ もう1語追加</text>
<rect x="345" y="600" width="145" height="48" rx="12" fill="#1C1C1E"/>
<text x="417" y="630" text-anchor="middle" font-size="14" fill="#FFFFFF">完了</text>
