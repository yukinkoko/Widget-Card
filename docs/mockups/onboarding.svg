<svg viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Hiragino Sans','Helvetica Neue',sans-serif">
<title>Onboarding 3ステップ モノクロ案</title>
<desc>ステップ1：何を覚えたいか目的を選ぶ。ステップ2：最初の単語セットを選ぶ。ステップ3：ホーム/ロック画面へのウィジェット追加を案内。各ステップに選択肢と次へボタン。完全モノクロ。</desc>
<rect x="0" y="0" width="680" height="470" rx="16" fill="#EEEEEC" stroke="#E4E4E2"/>
<text x="36" y="30" font-size="12" fill="#8A8C90">1. 目的を選ぶ</text>
<text x="254" y="30" font-size="12" fill="#8A8C90">2. セットを選ぶ</text>
<text x="472" y="30" font-size="12" fill="#8A8C90">3. ウィジェット追加</text>
<rect x="24" y="40" width="196" height="400" rx="32" fill="#F2F2F1" stroke="#DEDEDC" stroke-width="1.5"/>
<text x="48" y="92" font-size="16" fill="#1C1C1E">何を覚えたい？</text>
<text x="48" y="112" font-size="11" fill="#8A8C90">目的を選んでください</text>
<rect x="48" y="128" width="148" height="40" rx="10" fill="#FFFFFF" stroke="#1C1C1E" stroke-width="1.5"/>
<text x="64" y="153" font-size="13" fill="#1C1C1E">韓国語・旅行</text>
<text x="180" y="153" text-anchor="end" font-size="12" fill="#1C1C1E">✓</text>
<rect x="48" y="176" width="148" height="40" rx="10" fill="#FFFFFF" stroke="#DADAD8"/>
<text x="64" y="201" font-size="13" fill="#8A8C90">英会話</text>
<rect x="48" y="224" width="148" height="40" rx="10" fill="#FFFFFF" stroke="#DADAD8"/>
<text x="64" y="249" font-size="13" fill="#8A8C90">仕事の英語</text>
<rect x="48" y="272" width="148" height="40" rx="10" fill="#FFFFFF" stroke="#DADAD8"/>
<text x="64" y="297" font-size="13" fill="#8A8C90">資格・専門用語</text>
<rect x="48" y="336" width="148" height="40" rx="10" fill="#1C1C1E"/>
<text x="122" y="361" text-anchor="middle" font-size="14" fill="#FFFFFF">次へ</text>
<rect x="242" y="40" width="196" height="400" rx="32" fill="#F2F2F1" stroke="#DEDEDC" stroke-width="1.5"/>
<text x="266" y="92" font-size="16" fill="#1C1C1E">最初のセット</text>
<text x="266" y="112" font-size="11" fill="#8A8C90">あとで追加できます</text>
<rect x="266" y="128" width="148" height="48" rx="10" fill="#FFFFFF" stroke="#1C1C1E" stroke-width="1.5"/>
<text x="280" y="150" font-size="12" fill="#1C1C1E">韓国旅行で使う言葉</text>
<text x="280" y="167" font-size="11" fill="#8A8C90">32 words</text>
<text x="400" y="150" text-anchor="end" font-size="12" fill="#1C1C1E">✓</text>
<rect x="266" y="184" width="148" height="48" rx="10" fill="#FFFFFF" stroke="#DADAD8"/>
<text x="280" y="206" font-size="12" fill="#8A8C90">カフェ・買い物</text>
<text x="280" y="223" font-size="11" fill="#BCBEC2">20 words</text>
<rect x="266" y="240" width="148" height="48" rx="10" fill="#FFFFFF" stroke="#DADAD8"/>
<text x="280" y="262" font-size="12" fill="#8A8C90">空港・ホテルの英語</text>
<text x="280" y="279" font-size="11" fill="#BCBEC2">40 words</text>
<rect x="266" y="336" width="148" height="40" rx="10" fill="#1C1C1E"/>
<text x="340" y="361" text-anchor="middle" font-size="14" fill="#FFFFFF">次へ</text>
<rect x="460" y="40" width="196" height="400" rx="32" fill="#F2F2F1" stroke="#DEDEDC" stroke-width="1.5"/>
<text x="484" y="92" font-size="16" fill="#1C1C1E">ウィジェットを追加</text>
<text x="484" y="112" font-size="11" fill="#8A8C90">ホーム／ロック画面に置こう</text>
<rect x="484" y="128" width="148" height="86" rx="12" fill="#FFFFFF" stroke="#E9E9E7"/>
<text x="500" y="158" font-size="18" fill="#1C1C1E">감사합니다</text>
<text x="500" y="176" font-size="11" fill="#5E6066">カムサハムニダ</text>
<rect x="500" y="190" width="4" height="6" rx="2" fill="#1C1C1E"/>
<rect x="506.5" y="186" width="4" height="10" rx="2" fill="#1C1C1E"/>
<rect x="513" y="182" width="4" height="14" rx="2" fill="#D6D6D4"/>
<text x="484" y="244" font-size="12" fill="#8A8C90">1. ホーム画面を長押し</text>
<text x="484" y="268" font-size="12" fill="#8A8C90">2. ＋ → このアプリを選ぶ</text>
<text x="484" y="292" font-size="12" fill="#8A8C90">3. サイズを選んで完了</text>
<rect x="484" y="336" width="148" height="40" rx="10" fill="#1C1C1E"/>
<text x="558" y="361" text-anchor="middle" font-size="14" fill="#FFFFFF">はじめる</text>
</svg>
