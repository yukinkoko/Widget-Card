<svg viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Hiragino Sans','Helvetica Neue',sans-serif">
<title>ウィジェットに音声ボタンを追加（P1目標）</title>
<desc>MediumとSmallウィジェットに小さなスピーカー（音声）ボタンを追加。段階バーも併記。下にホーム画面は再生可能性あり・ロック画面はアプリを開くフォールバック・実装初期にスパイク検証する注記。完全モノクロ。</desc>
<rect x="0" y="0" width="680" height="330" rx="16" fill="#EEEEEC" stroke="#E4E4E2"/>
