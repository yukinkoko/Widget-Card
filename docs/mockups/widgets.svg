<text x="48" y="78" font-size="12" fill="#8A8C90">韓国旅行</text>
<rect x="300" y="73" width="4" height="6" rx="2" fill="#1C1C1E"/>
<rect x="306.5" y="69" width="4" height="10" rx="2" fill="#1C1C1E"/>
<rect x="313" y="65" width="4" height="14" rx="2" fill="#D6D6D4"/>
<text x="48" y="124" font-size="30" fill="#1C1C1E">감사합니다</text>
<circle cx="364" cy="118" r="17" fill="#F4F4F3" stroke="#E2E2E0"/>
